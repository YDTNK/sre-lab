<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SRE Lab - AI引越し診断</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <section class="hero">
      <span class="badge">SRE Portfolio Project</span>
      <h1>SRE Lab</h1>
      <p>
        SRE Labは、AIを活用した小さなWebサービスを構築・運用・監視し、
        信頼性改善と自動化を実践するための個人プロジェクトです。
      </p>
    </section>

    <section class="card">
      <h2>AI引越し診断</h2>
      <p>
        家具・衣類・家電・本などの情報を入力すると、
        引越し準備に必要な梱包資材やタスクの目安を確認できます。
      </p>

      <form id="moving-form">
        <div>
          <label for="furniture">家具リスト</label><br />
          <textarea
            id="furniture"
            name="furniture"
            rows="4"
            placeholder="例：デスク、椅子、ベッド、衣装ケース"
          ></textarea>
        </div>

        <div>
          <label for="clothes">衣類・収納用品</label><br />
          <input
            id="clothes"
            name="clothes"
            type="text"
            placeholder="例：衣装ケース3個、スーツケース2個"
          />
        </div>

        <div>
          <label for="electronics">家電・電子機器</label><br />
          <input
            id="electronics"
            name="electronics"
            type="text"
            placeholder="例：iMac、スピーカー、オーディオインターフェイス"
          />
        </div>

        <div>
          <label for="books">本・書類</label><br />
          <input
            id="books"
            name="books"
            type="text"
            placeholder="例：本30冊、書類一式"
          />
        </div>

        <div>
          <label for="moving-date">引越し予定日</label><br />
          <input id="moving-date" name="moving-date" type="date" />
        </div>

        <div>
          <label for="notes">補足情報</label><br />
          <textarea
            id="notes"
            name="notes"
            rows="4"
            placeholder="例：一人暮らし、梱包資材が必要、ダンベルあり"
          ></textarea>
        </div>

        <button type="submit">引越しチェックリストを作成</button>
      </form>
    </section>

    <section class="card">
      <h2>診断結果</h2>
      <div id="result">
        <p>入力後、チェックリストを作成できます。</p>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("moving-form");
    const result = document.getElementById("result");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const furniture = document.getElementById("furniture").value.trim();
      const clothes = document.getElementById("clothes").value.trim();
      const electronics = document.getElementById("electronics").value.trim();
      const books = document.getElementById("books").value.trim();
      const movingDate = document.getElementById("moving-date").value.trim();
      const notes = document.getElementById("notes").value.trim();

      const hasAnyInput = furniture || clothes || electronics || books || movingDate || notes;

      if (!hasAnyInput) {
        result.innerHTML = `
          <h3>引越し情報を入力してください</h3>
          <p>
            家具、衣類、家電、本、引越し予定日、補足情報のうち、
            最低1つ以上を入力してからチェックリストを作成してください。
          </p>
        `;
        return;
      }

      result.innerHTML = `
        <h3>基本チェックリスト</h3>
        <p><strong>引越し予定日：</strong> ${movingDate || "未入力"}</p>

        <h4>入力内容</h4>
        <ul>
          <li><strong>家具：</strong> ${furniture || "未入力"}</li>
          <li><strong>衣類・収納：</strong> ${clothes || "未入力"}</li>
          <li><strong>家電・電子機器：</strong> ${electronics || "未入力"}</li>
          <li><strong>本・書類：</strong> ${books || "未入力"}</li>
          <li><strong>補足：</strong> ${notes || "未入力"}</li>
        </ul>

        <h4>初期おすすめ準備</h4>
        <ul>
          <li>衣類・本・小物用にダンボールを複数用意してください。</li>
          <li>家電や音響機器は、緩衝材・タオル・プチプチで保護してください。</li>
          <li>本やダンベルなど重い物は、小さめの箱に分けて入れてください。</li>
          <li>建物の搬入経路、エレベーター、駐車スペースを事前確認してください。</li>
          <li>引越し1週間前までに、最終チェックリストを作成してください。</li>
        </ul>

        <p>
          ※これは静的MVP版の診断結果です。今後、AI APIを使ってより個別化された診断に拡張予定です。
        </p>
      `;
    });
  </script>
</body>
</html>
