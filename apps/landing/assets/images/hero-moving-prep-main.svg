<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" role="img" aria-labelledby="title desc">
  <title id="title">Moving preparation hero image</title>
  <desc id="desc">A clean wide vector illustration of cardboard boxes, a checklist, suitcase, plants, and packing tape for moving preparation.</desc>

  <defs>
    <linearGradient id="fade-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.32" stop-color="#ffffff" stop-opacity="0.02"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="box-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4b76c"/>
      <stop offset="1" stop-color="#dd8f3e"/>
    </linearGradient>
    <linearGradient id="box-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7c885"/>
      <stop offset="1" stop-color="#d98935"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="16" stdDeviation="16" flood-color="#406080" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="960" height="420" fill="#ffffff" opacity="0"/>
  <path d="M378 79C449 33 563 17 663 42c106 27 188 94 219 178 28 77-6 133-86 158-84 27-216 16-313-26-96-43-155-117-151-188 2-34 18-63 46-85Z" fill="#eaf5ff" opacity="0.82"/>
  <path d="M462 126c78-51 207-56 291-12 87 46 100 132 29 190-71 59-203 68-295 20-91-48-103-139-25-198Z" fill="#f7fbff" opacity="0.92"/>

  <g filter="url(#soft-shadow)">
    <ellipse cx="657" cy="350" rx="250" ry="32" fill="#d8e8f6" opacity="0.55"/>

    <!-- Back box -->
    <g transform="translate(520 176)">
      <path d="M0 54 86 18l104 34-86 39Z" fill="#f9c986"/>
      <path d="M0 54v103l104 41V91Z" fill="url(#box-front)"/>
      <path d="M104 91v107l86-47V52Z" fill="url(#box-side)"/>
      <path d="M42 37 132 72" stroke="#bf7530" stroke-width="6" stroke-linecap="round" opacity="0.38"/>
      <path d="M23 91 83 115" stroke="#bd7431" stroke-width="7" stroke-linecap="round" opacity="0.26"/>
    </g>

    <!-- Suitcase -->
    <g transform="translate(704 154)">
      <rect x="22" y="34" width="110" height="160" rx="22" fill="#6aa4ff"/>
      <rect x="38" y="54" width="78" height="118" rx="12" fill="#89bbff" opacity="0.72"/>
      <path d="M54 34V20c0-11 9-20 20-20h8c11 0 20 9 20 20v14" fill="none" stroke="#3d74cf" stroke-width="10" stroke-linecap="round"/>
      <path d="M54 78h50M54 110h50M54 142h50" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
      <circle cx="50" cy="204" r="10" fill="#2f5ea8"/>
      <circle cx="106" cy="204" r="10" fill="#2f5ea8"/>
    </g>

    <!-- Front box -->
    <g transform="translate(400 210)">
      <path d="M0 48 86 12l116 40-88 40Z" fill="#ffd08e"/>
      <path d="M0 48v112l114 48V92Z" fill="#eda75b"/>
      <path d="M114 92v116l88-51V52Z" fill="#db8b38"/>
      <path d="M42 29 150 67" stroke="#bd7431" stroke-width="6" stroke-linecap="round" opacity="0.34"/>
      <path d="M31 93 86 118" stroke="#a96527" stroke-width="7" stroke-linecap="round" opacity="0.28"/>
      <path d="M31 124 102 154" stroke="#a96527" stroke-width="7" stroke-linecap="round" opacity="0.22"/>
    </g>

    <!-- Checklist board -->
    <g transform="translate(585 72) rotate(-7)">
      <rect x="0" y="0" width="170" height="225" rx="18" fill="url(#paper)" stroke="#cde4f8" stroke-width="4"/>
      <rect x="48" y="-12" width="74" height="28" rx="10" fill="#6aa4ff"/>
      <path d="M36 58h95M36 93h96M36 128h96M36 163h82" stroke="#a8c2db" stroke-width="7" stroke-linecap="round"/>
      <path d="M18 55l9 9 16-20M18 90l9 9 16-20M18 125l9 9 16-20" fill="none" stroke="#34a853" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="27" cy="164" r="10" fill="#dcecff" stroke="#9ebde0" stroke-width="5"/>
    </g>

    <!-- Packing tape -->
    <g transform="translate(760 302)">
      <circle cx="50" cy="50" r="47" fill="#ffd84d"/>
      <circle cx="50" cy="50" r="24" fill="#fff8cd"/>
      <path d="M50 3a47 47 0 0 1 43 29l-31 10A17 17 0 0 0 50 33Z" fill="#f4bd23" opacity="0.8"/>
    </g>

    <!-- Plant -->
    <g transform="translate(824 172)">
      <path d="M48 114c-16-30-17-61-3-96" fill="none" stroke="#4b9b69" stroke-width="7" stroke-linecap="round"/>
      <path d="M45 48C10 30 17 3 52 26c-6 10-5 18-7 22Z" fill="#6fc48d"/>
      <path d="M52 72c35-18 49 7 16 30-8-11-14-19-16-30Z" fill="#49a66e"/>
      <path d="M48 92C10 90 2 60 39 64c2 11 5 20 9 28Z" fill="#75cf96"/>
      <path d="M20 126h65l-10 78H30Z" fill="#f39a56"/>
      <path d="M26 145h53" stroke="#c46f34" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
    </g>
  </g>

  <!-- Transparent fade helper: prevents a hard visual edge when placed under page gradients. -->
  <rect width="960" height="420" fill="url(#fade-left)"/>
</svg>
