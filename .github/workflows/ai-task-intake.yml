name: AI Task Intake

on:
  issues:
    types: [opened, labeled, assigned]

permissions:
  issues: write
  contents: read

jobs:
  intake:
    if: contains(github.event.issue.labels.*.name, 'codex-task')
    runs-on: ubuntu-latest

    steps:
      - name: Comment AI task instructions
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = `## AI Task Intake

This issue is marked as a Codex task.

Expected flow:

1. Create a feature branch
2. Implement only the requested scope
3. Open a pull request
4. Do not merge automatically
5. Wait for human review

Safety constraints:

- Do not push directly to main
- Do not add paid services
- Do not add external dependencies unless approved
- Preserve privacy/disclaimer/disclosure language
- Keep Cloudflare Pages compatibility`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });
