name: Validate Grafana Dedupe

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Deploy Worker
    types:
      - completed

jobs:
  validate:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check validation script syntax
        run: bash -n scripts/validate-grafana-dedupe.sh

      - name: Validate Grafana dedupe behavior
        env:
          GRAFANA_WEBHOOK_SECRET: ${{ secrets.GRAFANA_WEBHOOK_SECRET }}
        run: bash scripts/validate-grafana-dedupe.sh
