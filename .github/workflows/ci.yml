name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f AGENTS.md
          test -f README.md
          test -f docs/design-system/portfolio-ui-rules.md
          test -f docs/slo/reliability-demo-api.md
          test -f docs/runbooks/reliability-demo-api.md
          test -f docs/incidents/2026-06-19-reliability-demo-api-mvp-verification.md
          test -f docs/postmortems/template.md
          test -f docs/security/public-exposure.md
          test -f .github/pull_request_template.md
          test -f .github/workflows/ci.yml
          test -f .github/workflows/smoke-test.yml
          test -f .github/workflows/deploy-worker.yml
          test -f scripts/smoke-test.sh
          test -f scripts/validate-pr.sh
          test -f apps/landing/index.html
          test -f apps/landing/architecture.html
          test -f apps/landing/reliability.html
          test -f apps/landing/monitoring.html
          test -f apps/landing/cicd.html
          test -f apps/landing/incidents.html
          test -f apps/landing/cost.html
          test -f apps/landing/portfolio.css
          test -f apps/landing/layout-adjustments.css
          test -f apps/api/src/index.js
          test -f apps/api/package.json
          test -f apps/api/package-lock.json
          test -f apps/api/wrangler.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Check API syntax
        working-directory: apps/api
        run: node --check src/index.js

      - name: Run PR validation guardrails
        run: bash scripts/validate-pr.sh
