name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  basic-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check repository files
        run: |
          echo "SRE Lab CI started"
          ls -la
          test -f README.md
          test -f docs/roadmap.md
          test -f docs/architecture.md
          test -f docs/runbook.md
          test -f docs/incidents.md
          test -f docs/operations.md
          test -f apps/landing/index.html
