name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files
        run: |
          test -f README.md
          test -f docs/roadmap.md
          test -f docs/architecture.md
          test -f docs/runbook.md
          test -f docs/incidents.md
          test -f docs/operations.md
          test -f docs/services.md
          test -f docs/moving-assistant.md
          test -f docs/ai-api-design.md
          test -f apps/landing/index.html
          test -f apps/landing/styles.css
          test -f apps/api/src/index.js
          test -f apps/api/package.json
          test -f apps/api/package-lock.json
          test -f apps/api/wrangler.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm ci

      - name: Check API syntax
        working-directory: apps/api
        run: node --check src/index.js
